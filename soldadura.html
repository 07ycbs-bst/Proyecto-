<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Electricidad - Fluye T&B</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-light bg-white shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html"><i class="fa-solid fa-arrow-left me-2"></i> Volver</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-5">
                <div class="card p-4 shadow-sm border-0">
                    <h2 class="fw-bold">Soldadura</h2>
                    <img src="" id="imagen-servicio" class="img-fluid rounded my-3" style="height:200px; object-fit:cover;">
                    <p><strong>Precio Base:</strong> <span id="precio-servicio"></span></p>
                    <p id="descripcion-servicio"></p>
                    <button class="btn btn-primary w-100" onclick="abrirSubModal()">Solicitar Servicio</button>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card p-4 shadow-sm border-0">
                    <h4>Servicios Solicitados</h4>
                    <div id="lista-servicios"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="subModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content p-3">
            <input type="text" id="descripcion" class="form-control mb-2" placeholder="Descripción">
            <input type="number" id="precio" class="form-control mb-2" placeholder="Precio">
            <textarea id="detalle" class="form-control mb-2" placeholder="Detalles"></textarea>
            <button class="btn btn-success w-100" onclick="guardarServicio()">Guardar</button>
        </div></div>
    </div>

        <div class="modal fade" id="modalComentarios" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="tituloModalComentarios">Comentarios</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="lista-comentarios" class="mb-4" style="max-height: 300px; overflow-y: auto;">
                    </div>
                <hr>
                <div class="form-group">
                    <label class="form-label fw-bold">Escribe un comentario:</label>
                    <textarea id="nuevo-comentario" class="form-control" rows="3" placeholder="¿Tienes alguna duda o actualización?"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary" id="btnGuardarComentario">Enviar Comentario</button>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => { inicializarPaginaServicio('soldadura'); });</script>

</body>
</html>
